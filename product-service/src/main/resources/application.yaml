spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://localhost:3306/db_product?serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update

cloud:
  openfeign:
    circuitbreaker:
      enabled: true

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka


  security:
    oauth2:
      resourceserver:
        jwt:
          # Esta debe ser la URL de tu tenant, terminada en /
          issuer-uri: https://logintienda.us.auth0.com/
          # El audience debe ser el Identifier que creaste en el paso anterior
          audience: https://microserv.com.ar


