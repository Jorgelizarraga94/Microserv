spring:
  application:
    name: product
  datasource:
    url: jdbc:mysql://localhost:3306/db_product?serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update

cloud:
  openfeign:
    circuitbreaker:
      enabled: true

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka





